<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>羽毛球搭档轮换看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
:root{--bg:#07111f;--panel:#101e32;--line:rgba(180,205,235,.18);--text:#eef7ff;--muted:#9fb5ca;--cyan:#38d9d9;--gold:#ffd166;--red:#ff5d6c;--green:#67e8a7;--blue:#7aa7ff;--purple:#b892ff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 16% 4%,rgba(56,217,217,.16),transparent 28%),radial-gradient(circle at 86% 0,rgba(255,209,102,.14),transparent 28%),linear-gradient(135deg,#07111f,#0b1c30 55%,#08111f);color:var(--text);font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif}.wrap{width:min(1180px,calc(100vw - 18px));margin:auto;padding:16px 0 26px}header{padding:10px 0 14px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:28px;line-height:1.18}.sub{color:var(--muted);font-size:13px;line-height:1.7;margin:9px 0 0}.bar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}select,button{height:40px;border-radius:8px;border:1px solid var(--line);background:#0c1a2b;color:var(--text);padding:0 11px;font:inherit}select{flex:1 1 150px}button{flex:1 1 120px}.primary{background:linear-gradient(135deg,var(--cyan),var(--blue));border:0;color:#06101d;font-weight:800}.metrics,.cards,.grid,.two{display:grid;gap:10px}.metrics{grid-template-columns:repeat(2,1fr);margin:12px 0}.card,.panel{background:linear-gradient(180deg,rgba(18,38,66,.96),rgba(10,22,39,.94));border:1px solid var(--line);border-radius:8px;box-shadow:0 16px 45px rgba(0,0,0,.24)}.metric{padding:13px;min-height:88px}.label{color:var(--muted);font-size:12px}.value{font-size:25px;font-weight:900;margin-top:7px}.delta{color:var(--cyan);font-size:12px;margin-top:7px}.grid{grid-template-columns:1fr}.two{grid-template-columns:1fr}.panel{padding:12px;margin-bottom:10px}h2{font-size:16px;margin:0 0 9px}.chart{height:310px}.cards{grid-template-columns:1fr}.player{padding:13px}.player.active{border-color:rgba(56,217,217,.85);box-shadow:0 0 0 1px rgba(56,217,217,.32)}.top{display:flex;justify-content:space-between;gap:12px}.code{display:inline-grid;place-items:center;width:38px;height:38px;border-radius:50%;background:var(--cyan);color:#06101d;font-weight:900}.name{font-size:20px;font-weight:900;margin-top:8px}.score{text-align:right;color:var(--gold);font-weight:900}.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.mini div{border:1px solid var(--line);border-radius:7px;padding:8px;background:rgba(255,255,255,.035)}.mini strong{display:block;margin-top:3px;font-size:17px}.note,.insight{color:#d8e8f8;font-size:13px;line-height:1.65}.tag{display:inline-flex;margin:0 5px 5px 0;padding:3px 8px;border-radius:999px;border:1px solid rgba(56,217,217,.3);background:rgba(56,217,217,.12);color:#c7fbfb;font-size:12px}.warn{border-color:rgba(255,209,102,.35);background:rgba(255,209,102,.13);color:#ffe8a5}.table{overflow:auto;border:1px solid var(--line);border-radius:8px;max-height:420px}table{border-collapse:collapse;width:100%;font-size:12px}th,td{padding:8px;border-bottom:1px solid rgba(180,205,235,.12);white-space:nowrap;text-align:left}th{position:sticky;top:0;background:#10243d}td:last-child{white-space:normal;min-width:220px}@media(min-width:800px){.wrap{padding-top:24px}.metrics{grid-template-columns:repeat(6,1fr)}.grid{grid-template-columns:1fr 1fr 1fr}.two{grid-template-columns:1.15fr .85fr}.cards{grid-template-columns:repeat(3,1fr)}.chart{height:350px}h1{font-size:42px}.sub{font-size:15px}.bar{justify-content:flex-end}.bar select,.bar button{flex:0 0 auto}}
</style>
</head>
<body><main class="wrap"><header><h1>羽毛球搭档轮换数据看板</h1><p class="sub">整合 A/B/C/E/F/G 六位队员的搭档频次、冷门组合、轮休节奏、加权得分和战术提醒。选择队员或点击卡片后，图表会联动聚焦。</p><div class="bar"><select id="sel"></select><button id="all">全队视图</button><button class="primary" id="topBtn">查看重点提醒</button></div></header><section class="metrics" id="metrics"></section><section class="grid"><div class="panel"><h2>加权得分排名</h2><div id="rank" class="chart"></div></div><div class="panel"><h2>搭档关系网络</h2><div id="net" class="chart"></div></div><div class="panel"><h2>出场 / 轮休结构</h2><div id="rest" class="chart"></div></div></section><section class="cards" id="cards"></section><section class="two"><div class="panel"><h2>组合热度矩阵</h2><div id="heat" class="chart"></div></div><div class="panel"><h2>当前队员画像</h2><div id="radar" class="chart"></div></div></section><section class="two"><div class="panel"><h2>轮次时间线</h2><div id="timeline" class="chart"></div></div><div class="panel" id="tipsPanel"><h2>重点提醒</h2><div id="tips"></div></div></section><section class="panel"><h2>搭档明细表</h2><div class="table"><table><thead><tr><th>队员</th><th>高频搭档</th><th>冷门配对</th><th>轮休</th><th>得分</th><th>注意点</th></tr></thead><tbody id="rows"></tbody></table></div></section></main>
<script>
const D={players:[{code:'A',name:'詹詹',score:4.54,pairs:{E:3,G:3,F:2,B:1,C:1},coldPairs:['B','C'],rests:[6,9,12],notes:['AB、AC 各仅 1 次，临时配合容易跑位失误，后续要主动磨合。','常和 E/G/F 固定组队，遇到 B/C 时要提前沟通站位。','轮休集中在 6/9/12 局，上场前提前热身，避免久歇手冷。']},{code:'B',name:'大橙子',score:7.35,pairs:{F:2,G:3,E:2,A:1,C:1},coldPairs:['A','C'],rests:[1,4,7],notes:['AB、BC 只各打 1 局，BC 适配度最低，要提前约定前后场分工。','后场依赖 F/G，和 A/C 搭档时减少习惯性后撤。','开局频繁轮休，前半段上场节奏零碎，开局少松懈。']},{code:'C',name:'玥姐',score:5.62,pairs:{E:4,F:3,B:1,A:1,G:1},coldPairs:['B','A'],rests:[2,5,8,11,14],notes:['15 局休 5 场，轮休最多，连续休息后先颠球找手感。','几乎固定 E/F，AC、BC 缺乏磨合，搭档 A/B 时主动询问战术。','主打前场封网，搭档换成 A/B 时坚守前场位置。']},{code:'E',name:'菡爷',score:1.31,pairs:{A:3,C:4,B:2,F:1,G:1},coldPairs:['F','G'],rests:[3,6,9,12,15],notes:['EF、EG 都是后半程新组合，对阵 F/G 打法陌生，要避免按老队友习惯跑位。','轮休集中中后段，后半程上场失误率易上升。','全能型打法容易包揽全场，应适当放权给前场队友。']},{code:'F',name:'岳老师',score:11.44,pairs:{B:2,C:3,A:2,G:1,E:1},coldPairs:['G','E'],rests:[1,3,10,13],notes:['FG、EF 是末尾新配对，赛前快速沟通发球轮转。','擅长后场拉吊，搭配 G 梦姐时需要一人主动前移。','记分穿插分散，上场碎片化，每局开局先放慢节奏。']},{code:'G',name:'梦姐',score:4.92,pairs:{C:1,A:3,B:3,F:1,E:1},coldPairs:['F','E'],rests:[2,4,7,10,14],notes:['FG、EG 两场冷门在后半段，是全队磨合最少的组合。','长期和 A/B 搭档，临时换 E/F 要重新划分攻防区域。','轮休分散在中后局，连续上场少，需要快速适应新队友节奏。']}],rounds:[['AE','CG'],['AE'],['BF'],['AG','CE'],['AF','BE'],['BG','CF'],['AG','CE'],['AF','BE'],['BG','CF'],['AB','CE'],['AE','FG'],['BC','EG'],['AC','BF'],['AG','EF'],['BG','CF']]};
const C=['#38d9d9','#ffd166','#ff5d6c','#67e8a7','#7aa7ff','#b892ff'];let active='',charts={};const $=id=>document.getElementById(id),pn=c=>{let p=D.players.find(x=>x.code==c);return p?c+' '+p.name:c},pk=(a,b)=>[a,b].sort().join('');function pairs(){let m=new Map;D.players.forEach(p=>Object.entries(p.pairs).forEach(([o,n])=>{let k=pk(p.code,o),r=m.get(k)||{key:k,a:k[0],b:k[1],count:0,cold:false};r.count=Math.max(r.count,+n);r.cold=r.cold||p.coldPairs.includes(o)||(D.players.find(x=>x.code==o)?.coldPairs||[]).includes(p.code);m.set(k,r)}));return [...m.values()].sort((a,b)=>b.count-a.count||a.key.localeCompare(b.key))}function base(){return{backgroundColor:'transparent',textStyle:{color:'#dcecff'},tooltip:{trigger:'item',backgroundColor:'rgba(8,17,31,.95)',borderColor:'rgba(180,205,235,.22)',textStyle:{color:'#eef7ff'}},grid:{left:48,right:18,top:28,bottom:42}}}function setA(c){active=c||'';$('sel').value=active;render()}function render(){let ps=D.players,pa=pairs(),cold=pa.filter(x=>x.cold||x.count<=1),hi=[...ps].sort((a,b)=>b.score-a.score)[0],mr=[...ps].sort((a,b)=>b.rests.length-a.rests.length)[0];$('sel').innerHTML='<option value="">全队视图</option>'+ps.map(p=>`<option value="${p.code}">${pn(p.code)}</option>`).join('');$('sel').value=active;$('metrics').innerHTML=[['队员数',ps.length,'六人统计'],['组合数',pa.length,'累计 '+pa.reduce((s,x)=>s+x.count,0)+' 次'],['冷门组合',cold.length,cold.map(x=>x.key).join(' / ')],['最高加权',hi.score.toFixed(2),pn(hi.code)],['轮休最多',mr.rests.length,pn(mr.code)],['分差',(Math.max(...ps.map(p=>p.score))-Math.min(...ps.map(p=>p.score))).toFixed(2),'攻防承压差异']].map(x=>`<article class="card metric"><div class="label">${x[0]}</div><div class="value">${x[1]}</div><div class="delta">${x[2]}</div></article>`).join('');$('cards').innerHTML=ps.map((p,i)=>{let arr=Object.entries(p.pairs).sort((a,b)=>b[1]-a[1]);return`<article class="card player ${active==p.code?'active':''}" onclick="setA('${p.code}')"><div class="top"><div><span class="code" style="background:${C[i]}">${p.code}</span><div class="name">${p.name}</div></div><div class="score"><div class="label">加权得分</div>${p.score.toFixed(2)}</div></div><div class="mini"><div><span class="label">出场</span><strong>${arr.reduce((s,x)=>s+x[1],0)}</strong></div><div><span class="label">轮休</span><strong>${p.rests.length}</strong></div><div><span class="label">冷门</span><strong>${p.coldPairs.length}</strong></div></div><p class="note">${arr.slice(0,3).map(x=>pn(x[0])+' '+x[1]+'次').join('、')}</p></article>`}).join('');drawRank();drawNet();drawRest();drawHeat();drawRadar();drawTimeline();drawTips();drawRows()}function drawRank(){let a=[...D.players].sort((x,y)=>x.score-y.score);charts.rank.setOption({...base(),xAxis:{type:'value',splitLine:{lineStyle:{color:'rgba(180,205,235,.09)'}}},yAxis:{type:'category',data:a.map(p=>pn(p.code))},series:[{type:'bar',barWidth:20,data:a.map((p,i)=>({value:p.score,itemStyle:{color:active&&p.code!=active?'rgba(122,167,255,.25)':C[i%C.length]}})),label:{show:true,position:'right',color:'#eef7ff'}}]},true)}function drawNet(){let pa=pairs();charts.net.setOption({...base(),series:[{type:'graph',layout:'circular',roam:true,data:D.players.map((p,i)=>({id:p.code,name:pn(p.code),value:p.score,symbolSize:34+p.score*2,itemStyle:{color:active&&p.code!=active?'rgba(122,167,255,.3)':C[i]}})),links:pa.map(p=>({source:p.a,target:p.b,value:p.count,lineStyle:{width:1.5+p.count,color:p.cold||p.count<=1?'#ffd166':'#38d9d9',opacity:active&&!p.key.includes(active)?.15:.8},label:{show:p.count>=3||p.count<=1,formatter:p.key+' '+p.count}})),label:{show:true,color:'#eef7ff'},emphasis:{focus:'adjacency'}}]},true)}function drawRest(){charts.rest.setOption({...base(),legend:{textStyle:{color:'#dcecff'}},xAxis:{type:'category',data:D.players.map(p=>pn(p.code)),axisLabel:{rotate:25}},yAxis:{type:'value',splitLine:{lineStyle:{color:'rgba(180,205,235,.09)'}}},series:[{name:'出场',type:'bar',stack:'t',data:D.players.map(p=>15-p.rests.length),itemStyle:{color:'#38d9d9'}},{name:'轮休',type:'bar',stack:'t',data:D.players.map(p=>p.rests.length),itemStyle:{color:'#ff5d6c'}}]},true)}function drawHeat(){let codes=D.players.map(p=>p.code),mp=new Map(pairs().map(p=>[p.key,p])),data=[];codes.forEach((a,y)=>codes.forEach((b,x)=>data.push([x,y,a==b?'-':mp.get(pk(a,b))?.count||0])));charts.heat.setOption({...base(),grid:{left:62,right:20,top:20,bottom:44},xAxis:{type:'category',data:codes.map(pn),axisLabel:{rotate:25}},yAxis:{type:'category',data:codes.map(pn)},visualMap:{min:0,max:4,left:'center',bottom:0,orient:'horizontal',textStyle:{color:'#dcecff'},inRange:{color:['#12243c','#245b78','#38d9d9','#ffd166']}},series:[{type:'heatmap',data,label:{show:true,color:'#eef7ff'}}]},true)}function drawRadar(){let p=D.players.find(x=>x.code==active)||[...D.players].sort((a,b)=>b.score-a.score)[0],mx=Math.max(...D.players.map(x=>x.score)),vals=Object.values(p.pairs);charts.radar.setOption({...base(),radar:{radius:'62%',indicator:[{name:'加权得分',max:10},{name:'搭档多样性',max:5},{name:'最高默契',max:4},{name:'冷门风险',max:3},{name:'轮休压力',max:5}],axisName:{color:'#dcecff'},splitLine:{lineStyle:{color:'rgba(180,205,235,.14)'}},splitArea:{areaStyle:{color:['rgba(255,255,255,.02)','rgba(255,255,255,.04)']}}},series:[{type:'radar',data:[{name:pn(p.code),value:[p.score/mx*10,Object.keys(p.pairs).length,Math.max(...vals),p.coldPairs.length,p.rests.length],areaStyle:{color:'rgba(56,217,217,.18)'},lineStyle:{color:'#38d9d9',width:3},itemStyle:{color:'#ffd166'}}]}]},true)}function drawTimeline(){let codes=D.players.map(p=>p.code),data=[];D.rounds.forEach((rs,i)=>rs.forEach(pair=>pair.split('').sort().forEach(c=>data.push([i+1,codes.indexOf(c),pair.split('').sort().join('')]))));charts.timeline.setOption({...base(),grid:{left:62,right:18,top:20,bottom:36},xAxis:{type:'category',data:Array.from({length:15},(_,i)=>i+1),name:'局次'},yAxis:{type:'category',data:codes.map(pn)},series:[{type:'scatter',symbolSize:18,data,itemStyle:{color:p=>{let cold=pairs().some(x=>x.key==p.data[2]&&(x.cold||x.count<=1));return active&&!p.data[2].includes(active)?'rgba(122,167,255,.22)':cold?'#ffd166':'#38d9d9'}},label:{show:true,formatter:p=>p.data[2],position:'top',color:'#eef7ff',fontSize:10}}]},true)}function drawTips(){let list=active?D.players.filter(p=>p.code==active):[...D.players].sort((a,b)=>b.coldPairs.length-a.coldPairs.length||b.rests.length-a.rests.length).slice(0,4);$('tips').innerHTML=list.map(p=>`<div class="insight"><b>${pn(p.code)}</b><br>${p.notes.map(n=>'• '+n).join('<br>')}</div>`).join('<hr style="border-color:rgba(180,205,235,.14);border-style:solid none none">')}function drawRows(){$('rows').innerHTML=D.players.map(p=>{let arr=Object.entries(p.pairs).sort((a,b)=>b[1]-a[1]);return`<tr><td><b>${pn(p.code)}</b></td><td>${arr.filter(x=>x[1]>=2).map(x=>`<span class="tag">${pn(x[0])} ${x[1]}次</span>`).join('')}</td><td>${p.coldPairs.map(c=>`<span class="tag warn">${p.code}${c} 1次</span>`).join('')}</td><td>${p.rests.join('、')}</td><td>${p.score.toFixed(2)}</td><td>${p.notes[0]}</td></tr>`}).join('')}['rank','net','rest','heat','radar','timeline'].forEach(id=>charts[id]=echarts.init($(id)));$('sel').onchange=e=>setA(e.target.value);$('all').onclick=()=>setA('');$('topBtn').onclick=()=>$('tipsPanel').scrollIntoView({behavior:'smooth'});window.onresize=()=>Object.values(charts).forEach(c=>c.resize());render();
</script></body></html>
